name: Modify Kwrt Firmware to Router Mode

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'Kwrt/OpenWrt 固件下载链接'
        required: true
        default: 'https://media.githubusercontent.com/media/liem0352/xiaomi-r3d-router-firmware/main/kwrt-02.22.2026-ipq806x-generic-xiaomi_r3d-squashfs-sysupgrade.bin'

env:
  OUTPUT_FIRMWARE: "kwrt-02.22.2026-r3d-router-mode-sysupgrade.bin"

jobs:
  modify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y squashfs-tools tar wget curl gzip xz-utils

    - name: Download Firmware
      run: |
        echo "=== 下载固件 ==="
        wget -O original.bin "${{ github.event.inputs.firmware_url }}"
        ls -lh original.bin

    - name: Extract Firmware
      run: |
        echo "=== 提取固件 ==="
        mkdir -p firmware_work
        cd firmware_work
        cp ../original.bin .
        tar -xf original.bin
        ls -la

    - name: Extract SquashFS
      run: |
        echo "=== 解压 SquashFS ==="
        cd firmware_work
        mkdir -p rootfs
        unsquashfs -f -d rootfs sysupgrade-xiaomi_r3d/root 2>&1 || true
        ls -la rootfs/

    - name: Modify Network Config
      run: |
        cd firmware_work
        cp rootfs/etc/config/network rootfs/etc/config/network.backup 2>/dev/null || true
        printf "config interface 'loopback'\n    option device 'lo'\n    option proto 'static'\n    option ipaddr '127.0.0.1'\n    option netmask '255.0.0.0'\n\nconfig globals 'globals'\n    option ula_prefix 'auto'\n\nconfig interface 'wan'\n    option device 'eth0'\n    option proto 'dhcp'\n    option ipv6 'auto'\n\nconfig interface 'wan6'\n    option device '@wan'\n    option proto 'dhcpv6'\n\nconfig interface 'lan'\n    option device 'br-lan'\n    option proto 'static'\n    option ipaddr '192.168.1.1'\n    option netmask '255.255.255.0'\n    option ip6assign '60'\n\nconfig device\n    option name 'br-lan'\n    option type 'bridge'\n    list ports 'eth1'\n    list ports 'eth2'\n    list ports 'eth3'\n\nconfig dhcp 'lan'\n    option interface 'lan'\n    option start '100'\n    option limit '150'\n    option leasetime '12h'\n\nconfig dhcp 'wan'\n    option interface 'wan'\n    option ignore '1'\n" > rootfs/etc/config/network
        echo "Done: network config"

    - name: Modify Firewall Config
      run: |
        cd firmware_work
        cp rootfs/etc/config/firewall rootfs/etc/config/firewall.backup 2>/dev/null || true
        printf "config defaults\n    option syn_flood '1'\n    option input 'REJECT'\n    option output 'ACCEPT'\n    option forward 'REJECT'\n\nconfig zone\n    option name 'lan'\n    list network 'lan'\n    option input 'ACCEPT'\n    option output 'ACCEPT'\n    option forward 'ACCEPT'\n\nconfig zone\n    option name 'wan'\n    list network 'wan'\n    list network 'wan6'\n    option input 'REJECT'\n    option output 'ACCEPT'\n    option forward 'REJECT'\n    option masq '1'\n    option mtu_fix '1'\n\nconfig forwarding\n    option src 'lan'\n    option dest 'wan'\n" > rootfs/etc/config/firewall
        echo "Done: firewall config"

    - name: Add First Boot Script
      run: |
        cd firmware_work
        mkdir -p rootfs/etc/uci-defaults
        printf '#!/bin/sh\nsleep 3\nif [ ! -f /etc/.router_mode_configured ]; then\n    uci set system.@system[0].hostname="Xiaomi-R3D-Router"\n    uci set network.wan=interface\n    uci set network.wan.proto="dhcp"\n    uci set network.wan.device="eth0"\n    uci set network.lan.proto="static"\n    uci set network.lan.ipaddr="192.168.1.1"\n    uci set network.lan.netmask="255.255.255.0"\n    uci set dhcp.lan.ignore="0"\n    uci set dhcp.lan.start="100"\n    uci set dhcp.lan.limit="150"\n    uci set firewall.@zone[1].masq="1"\n    uci commit system\n    uci commit network\n    uci commit dhcp\n    uci commit firewall\n    passwd -d root\n    touch /etc/.router_mode_configured\n    /etc/init.d/network restart\nfi\n' > rootfs/etc/uci-defaults/99-router-mode
        chmod +x rootfs/etc/uci-defaults/99-router-mode
        echo "Done: first boot script"

    - name: Repack Firmware
      run: |
        cd firmware_work
        mksquashfs rootfs new_rootfs.squashfs -comp xz -b 262144
        mkdir -p sysupgrade-xiaomi_r3d
        mv new_rootfs.squashfs sysupgrade-xiaomi_r3d/root
        tar -cf "../$OUTPUT_FIRMWARE" sysupgrade-xiaomi_r3d/
        cd ..
        ls -lh "$OUTPUT_FIRMWARE"

    - name: Generate Checksum
      run: sha256sum "$OUTPUT_FIRMWARE" > "${OUTPUT_FIRMWARE}.sha256" && cat "${OUTPUT_FIRMWARE}.sha256"

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: kwrt-router-mode-firmware
        path: |
          ${{ env.OUTPUT_FIRMWARE }}
          ${{ env.OUTPUT_FIRMWARE }}.sha256
        retention-days: 30

    - name: Summary
      run: |
        echo "=== 修改完成 ==="
        ls -lh "$OUTPUT_FIRMWARE"
        cat "${OUTPUT_FIRMWARE}.sha256"
