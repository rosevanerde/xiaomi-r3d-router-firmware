name: Modify Kwrt Firmware to Router Mode

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'Kwrt/OpenWrt 固件下载链接'
        required: true
        default: 'https://media.githubusercontent.com/media/liem0352/xiaomi-r3d-router-firmware/main/kwrt-02.22.2026-ipq806x-generic-xiaomi_r3d-squashfs-sysupgrade.bin'

env:
  OUTPUT_FIRMWARE: "kwrt-02.22.2026-r3d-router-mode-sysupgrade.bin"

jobs:
  modify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Install Dependencies
      run: sudo apt-get update && sudo apt-get install -y squashfs-tools tar wget curl gzip xz-utils

    - name: Download Firmware
      run: wget -O original.bin "${{ github.event.inputs.firmware_url }}" && ls -lh original.bin

    - name: Extract Firmware
      run: mkdir -p firmware_work && cd firmware_work && cp ../original.bin . && tar -xf original.bin && ls -la

    - name: Extract SquashFS
      run: cd firmware_work && mkdir -p rootfs && unsquashfs -f -d rootfs sysupgrade-xiaomi_r3d/root 2>&1 || true && ls -la rootfs/

    - name: Show and Modify Configs
      run: |
        cd firmware_work
        echo "=== Original network ==="
        cat rootfs/etc/config/network || echo "Not found"
        echo ""
        
        echo "=== Creating network config ==="
        echo "config interface 'loopback'" > rootfs/etc/config/network
        echo "    option device 'lo'" >> rootfs/etc/config/network
        echo "    option proto 'static'" >> rootfs/etc/config/network
        echo "    option ipaddr '127.0.0.1'" >> rootfs/etc/config/network
        echo "    option netmask '255.0.0.0'" >> rootfs/etc/config/network
        echo "" >> rootfs/etc/config/network
        echo "config globals 'globals'" >> rootfs/etc/config/network
        echo "    option ula_prefix 'auto'" >> rootfs/etc/config/network
        echo "" >> rootfs/etc/config/network
        echo "config interface 'wan'" >> rootfs/etc/config/network
        echo "    option device 'eth0'" >> rootfs/etc/config/network
        echo "    option proto 'dhcp'" >> rootfs/etc/config/network
        echo "    option ipv6 'auto'" >> rootfs/etc/config/network
        echo "" >> rootfs/etc/config/network
        echo "config interface 'wan6'" >> rootfs/etc/config/network
        echo "    option device '@wan'" >> rootfs/etc/config/network
        echo "    option proto 'dhcpv6'" >> rootfs/etc/config/network
        echo "" >> rootfs/etc/config/network
        echo "config interface 'lan'" >> rootfs/etc/config/network
        echo "    option device 'br-lan'" >> rootfs/etc/config/network
        echo "    option proto 'static'" >> rootfs/etc/config/network
        echo "    option ipaddr '192.168.1.1'" >> rootfs/etc/config/network
        echo "    option netmask '255.255.255.0'" >> rootfs/etc/config/network
        echo "    option ip6assign '60'" >> rootfs/etc/config/network
        echo "" >> rootfs/etc/config/network
        echo "config device" >> rootfs/etc/config/network
        echo "    option name 'br-lan'" >> rootfs/etc/config/network
        echo "    option type 'bridge'" >> rootfs/etc/config/network
        echo "    list ports 'eth1'" >> rootfs/etc/config/network
        echo "    list ports 'eth2'" >> rootfs/etc/config/network
        echo "    list ports 'eth3'" >> rootfs/etc/config/network
        echo "" >> rootfs/etc/config/network
        echo "config dhcp 'lan'" >> rootfs/etc/config/network
        echo "    option interface 'lan'" >> rootfs/etc/config/network
        echo "    option start '100'" >> rootfs/etc/config/network
        echo "    option limit '150'" >> rootfs/etc/config/network
        echo "    option leasetime '12h'" >> rootfs/etc/config/network
        echo "    option ignore '0'" >> rootfs/etc/config/network
        echo "" >> rootfs/etc/config/network
        echo "config dhcp 'wan'" >> rootfs/etc/config/network
        echo "    option interface 'wan'" >> rootfs/etc/config/network
        echo "    option ignore '1'" >> rootfs/etc/config/network
        
        echo ""
        echo "=== New network config ==="
        cat rootfs/etc/config/network
        
        echo ""
        echo "=== Creating firewall config ==="
        echo "config defaults" > rootfs/etc/config/firewall
        echo "    option syn_flood '1'" >> rootfs/etc/config/firewall
        echo "    option input 'REJECT'" >> rootfs/etc/config/firewall
        echo "    option output 'ACCEPT'" >> rootfs/etc/config/firewall
        echo "    option forward 'REJECT'" >> rootfs/etc/config/firewall
        echo "" >> rootfs/etc/config/firewall
        echo "config zone" >> rootfs/etc/config/firewall
        echo "    option name 'lan'" >> rootfs/etc/config/firewall
        echo "    list network 'lan'" >> rootfs/etc/config/firewall
        echo "    option input 'ACCEPT'" >> rootfs/etc/config/firewall
        echo "    option output 'ACCEPT'" >> rootfs/etc/config/firewall
        echo "    option forward 'ACCEPT'" >> rootfs/etc/config/firewall
        echo "" >> rootfs/etc/config/firewall
        echo "config zone" >> rootfs/etc/config/firewall
        echo "    option name 'wan'" >> rootfs/etc/config/firewall
        echo "    list network 'wan'" >> rootfs/etc/config/firewall
        echo "    list network 'wan6'" >> rootfs/etc/config/firewall
        echo "    option input 'REJECT'" >> rootfs/etc/config/firewall
        echo "    option output 'ACCEPT'" >> rootfs/etc/config/firewall
        echo "    option forward 'REJECT'" >> rootfs/etc/config/firewall
        echo "    option masq '1'" >> rootfs/etc/config/firewall
        echo "    option mtu_fix '1'" >> rootfs/etc/config/firewall
        echo "" >> rootfs/etc/config/firewall
        echo "config forwarding" >> rootfs/etc/config/firewall
        echo "    option src 'lan'" >> rootfs/etc/config/firewall
        echo "    option dest 'wan'" >> rootfs/etc/config/firewall
        
        echo ""
        echo "=== New firewall config ==="
        cat rootfs/etc/config/firewall

    - name: Repack Firmware
      run: cd firmware_work && mksquashfs rootfs new_rootfs.squashfs -comp xz -b 262144 && mkdir -p sysupgrade-xiaomi_r3d && mv new_rootfs.squashfs sysupgrade-xiaomi_r3d/root && tar -cf "../$OUTPUT_FIRMWARE" sysupgrade-xiaomi_r3d/ && cd .. && ls -lh "$OUTPUT_FIRMWARE"

    - name: Generate Checksum
      run: sha256sum "$OUTPUT_FIRMWARE" > "${OUTPUT_FIRMWARE}.sha256" && cat "${OUTPUT_FIRMWARE}.sha256"

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: kwrt-router-mode-firmware-v3
        path: |
          ${{ env.OUTPUT_FIRMWARE }}
          ${{ env.OUTPUT_FIRMWARE }}.sha256
        retention-days: 30

    - name: Summary
      run: ls -lh "$OUTPUT_FIRMWARE" && cat "${OUTPUT_FIRMWARE}.sha256"
